<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空調系統控制台</title>
    
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background-color: #004d40; text-align: center; padding: 12px 0; font-size: 18px; font-weight: bold; }
        .control-panel { background-color: #0d47a1; margin: 12px; padding: 14px; border-radius: 8px; }
        .status-btn { background: transparent; border: 1px solid #ff5252; color: #ff5252; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .status-btn.connected { border-color: #69f0ae; color: #69f0ae; }
        .input-group { display: flex; gap: 8px; margin-top: 14px; }
        .input-group input { flex: 1; background: #000; border: 1px solid #546e7a; color: #fff; padding: 8px; border-radius: 4px; }
        .input-group button { background: #333; color: #fff; border: 1px solid #666; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 0 12px; max-height: 200px; overflow-y: auto; }
        .menu-grid button { background-color: #1e1e1e; color: #69f0ae; border: 1px solid #333333; padding: 10px; border-radius: 4px; cursor: pointer; text-align: left; font-size: 12px; }
        .terminal { flex: 1; background-color: #000000; border: 1px solid #222222; margin: 12px; padding: 8px; font-size: 12px; color: #00ff00; overflow-y: scroll; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="header">空調系統控制台</div>
    <div class="control-panel">
        <button class="status-btn" id="conn-status" onclick="handleConnection()">[啟動藍牙連線]</button>
        <div class="input-group">
            <input type="text" id="cmd-input" placeholder="輸入指令...">
            <button onclick="sendManualCmd()">發送</button>
        </div>
    </div>

    <div class="menu-grid" id="ui-menu-grid">
        <div style="color: #666; grid-column: span 2; padding: 10px;">請先連線以載入選單...</div>
    </div>

    <div class="terminal" id="terminal-box">[系統]: 等待連線中...</div>

    <script>
        let g_txCharacteristic = null;
        let dataBuffer = "";
        let menuRawLines = [];

        async function handleConnection() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                g_txCharacteristic = char;
                document.getElementById('conn-status').innerText = "[已連線]";
                document.getElementById('conn-status').className = "status-btn connected";
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    let decoder = new TextDecoder('iso-8859-1');
                    let rawData = decoder.decode(event.target.value);
                    
                    // 移植 Android 的 ANSI 清理邏輯
                    let processedText = rawData
                        .replace(/\u001b\[2J/g, "").replace(/\u001b\[H/g, "")
                        .replace(/\x1B\[\??[0-9;]*[a-zA-Z]/g, "")
                        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, "");

                    handleRawData(processedText);
                });
            } catch (e) { alert("連線失敗: " + e); }
        }

        function handleRawData(chunk) {
            dataBuffer += chunk;
            if (dataBuffer.includes('\n')) {
                let lines = dataBuffer.split('\n');
                dataBuffer = lines.pop();
                lines.forEach(line => processIncomingLine(line.trim()));
            }
        }

        function processIncomingLine(line) {
            if (!line) return;
            const term = document.getElementById('terminal-box');
            term.innerHTML += line + '<br>';
            term.scrollTop = term.scrollHeight;

            // 匹配格式 (數字) 內容，抓取選單
            if (/^\(\d+\)\s+.+/.test(line)) {
                if (!menuRawLines.includes(line)) {
                    menuRawLines.push(line);
                    renderUiMenu(menuRawLines);
                }
            }
        }

        function renderUiMenu(lines) {
            const grid = document.getElementById('ui-menu-grid');
            grid.innerHTML = '';
            lines.forEach(line => {
                const match = line.match(/\((\d+)\)/);
                const cmd = match ? match[1] : '';
                const btn = document.createElement('button');
                btn.innerText = line;
                btn.onclick = () => sendBle232RawCmd(cmd);
                grid.appendChild(btn);
            });
        }

        // 發送指令邏輯
        async function sendManualCmd() {
            const input = document.getElementById('cmd-input');
            if (input.value) sendBle232RawCmd(input.value);
            input.value = '';
        }

        async function sendBle232RawCmd(cmd) {
            if (!g_txCharacteristic) return;
            const data = new TextEncoder().encode(cmd + "\r\n");
            await g_txCharacteristic.writeValueWithoutResponse(data);
            const term = document.getElementById('terminal-box');
            term.innerHTML += `<br><span style="color: #ffb74d;">>> 發送: ${cmd}</span><br>`;
        }
    </script>
</body>
</html>
