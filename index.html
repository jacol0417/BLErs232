<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>空調系統重置</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
margin: 0; padding: 0; background-color: #121212; color: #ffffff;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.header { background-color: #b71c1c; color: #ffffff; text-align: center; padding: 12px 0; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
.control-panel { background-color: #0d47a1; margin: 12px; padding: 14px; border-radius: 8px; }
.hardware-row { display: flex; justify-content: space-between; align-items: center; color: #ffffff; font-weight: bold; font-size: 14px; }
.hardware-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
.status-btn { background: transparent; border: 1px solid #ff5252; color: #ff5252; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s ease; white-space: nowrap; flex-shrink: 0; }
.status-btn.connected { border-color: #69f0ae; color: #69f0ae; }
.status-btn.connecting { border-color: #ffd740; color: #ffd740; }

.input-group { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-top: 14px; }
.input-group input { flex: 1; min-width: 80px; background: transparent; border: none; border-bottom: 2px solid #546e7a; color: #ffffff; padding: 6px 4px; font-size: 16px; outline: none; }
.input-group input:disabled { border-bottom: 2px solid #37474f; color: #555555; }

.input-group button { background: transparent; border: 1px solid #ffffff; border-radius: 4px; color: #ffffff; font-size: 14px; cursor: pointer; padding: 6px 12px; white-space: nowrap; flex-shrink: 0; font-weight: bold; }
.input-group button:disabled { color: #555555; border-color: #37474f; cursor: not-allowed; }

#encode-btn { border-color: #69f0ae; color: #69f0ae; }
#clear-btn { color: #ffb74d; border-color: #ffb74d; }
#send-btn { color: #4fc3f7; border-color: #4fc3f7; }

.menu-section { padding: 0 12px; margin-bottom: 8px; }
.menu-title { color: #aaaaaa; font-size: 14px; margin-bottom: 6px; }

/* 🎯 修正 1 & 2：提高選單最大高度，並強制在 iOS 上浮現滾動條 */
.menu-grid { 
  display: grid; 
  grid-template-columns: repeat(2, 1fr); 
  gap: 8px; 
  max-height: 220px; 
  overflow-y: auto; 
  contain: content; 
}
.menu-grid::-webkit-scrollbar {
  -webkit-appearance: none;
  width: 6px;
}
.menu-grid::-webkit-scrollbar-thumb {
  border-radius: 3px;
  background-color: rgba(255, 255, 255, 0.3);
}

.menu-grid button { background-color: #1e1e1e; color: #69f0ae; border: 1px solid #333333; padding: 10px; border-radius: 4px; text-align: left; font-size: 13px; font-family: monospace; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.menu-grid button:active { background-color: #333333; }

.console-section { flex: 1; margin: 0 12px 12px 12px; display: flex; flex-direction: column; overflow: hidden; }
.console-title { color: #aaaaaa; font-size: 14px; margin-bottom: 4px; }

.terminal { 
  flex: 1; 
  background-color: #000000; 
  border: 1px solid #222222; 
  padding: 8px; 
  font-family: monospace; 
  font-size: 12px; 
  color: #00ff00; 
  line-height: 1.4; 
  overflow: auto; 
  white-space: pre; 
  -webkit-overflow-scrolling: touch; 
}
</style>
</head>
<body>

<div class="header">空調系統重置 (狀態機除錯版)</div>

<div class="control-panel">
<div class="hardware-row">
<div class="hardware-title" id="hardware-id">線材識別：等待網頁藍牙連線...</div>
<button class="status-btn" id="conn-status" onclick="handleConnectionClick()">[未連線]</button>
</div>

<div class="input-group">
<input type="text" id="cmd-input" placeholder="請先連接硬體..." disabled onkeydown="if(event.key==='Enter') sendManualCmd()">
<button id="encode-btn" onclick="toggleEncoding()">ASCII</button>
<button id="clear-btn" onclick="clearConsole()">清除</button>
<button id="send-btn" onclick="sendManualCmd()" disabled>傳送</button>
</div>
</div>

<div class="menu-section">
<div class="menu-title">功能選單 (點擊即發送)</div>
<div class="menu-grid" id="ui-menu-grid">
<div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先建立藍牙連線...</div>
</div>
</div>

<div class="console-section">
<div class="console-title">接收控制台 (80 × 24 虛擬終端)</div>
<div class="terminal" id="terminal-box"></div>
</div>

<script>
class TerminalView {
    constructor(element) {
        this.element = element;
        this.terminalRows = 24;
        this.terminalCols = 80;
        
        this.screenBuffer = Array.from({ length: this.terminalRows }, () => new Array(this.terminalCols).fill(' '));
        this.cursorRow = 0;
        this.cursorCol = 0;

        this.ParserState = { NORMAL: 0, ESC: 1, CSI: 2 };
        this.currentState = this.ParserState.NORMAL;
        this.csiBuffer = '';

        this.isRenderPending = false;
        this.renderTimeout = null;
    }

    writeText(text) {
        for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            switch (this.currentState) {
                case this.ParserState.NORMAL:
                    switch (ch) {
                        case '\x1b':
                            this.currentState = this.ParserState.ESC;
                            break;
                        case '\n':
                            this.cursorRow++;
                            if (this.cursorRow >= this.terminalRows) {
                                this.scrollUpBuffer();
                                this.cursorRow = this.terminalRows - 1;
                            }
                            break;
                        case '\r':
                            this.cursorCol = 0;
                            break;
                        default:
                            if (this.cursorRow >= 0 && this.cursorRow < this.terminalRows &&
                                this.cursorCol >= 0 && this.cursorCol < this.terminalCols) {
                                this.screenBuffer[this.cursorRow][this.cursorCol] = ch;
                                this.cursorCol++;

                                if (this.cursorCol >= this.terminalCols) {
                                    this.cursorCol = 0;
                                    this.cursorRow++;
                                    if (this.cursorRow >= this.terminalRows) {
                                        this.scrollUpBuffer();
                                        this.cursorRow = this.terminalRows - 1;
                                    }
                                }
                            }
                            break;
                    }
                    break;

                case this.ParserState.ESC:
                    if (ch === '[') {
                        this.csiBuffer = '';
                        this.currentState = this.ParserState.CSI;
                    } else {
                        this.currentState = this.ParserState.NORMAL;
                    }
                    break;

                case this.ParserState.CSI:
                    if ((ch >= '0' && ch <= '9') || ch === ';' || ch === '?' || ch === '"') {
                        this.csiBuffer += ch;
                    } else {
                        this.handleCsiCommand(ch, this.csiBuffer);
                        this.currentState = this.ParserState.NORMAL;
                    }
                    break;
            }
        }
        this.triggerRequestRender();
    }

    handleCsiCommand(cmd, params) {
        switch (cmd) {
            case 'H':
            case 'f':
                if (params === '') {
                    this.cursorRow = 0;
                    this.cursorCol = 0;
                } else {
                    const parts = params.split(';');
                    const r = parseInt(parts[0], 10) || 1;
                    const c = parseInt(parts[1], 10) || 1;
                    this.cursorRow = Math.max(0, Math.min(r - 1, this.terminalRows - 1));
                    this.cursorCol = Math.max(0, Math.min(c - 1, this.terminalCols - 1));
                }
                break;
            case 'J':
                if (params === '2' || params === '') {
                    for (let r = 0; r < this.terminalRows; r++) {
                        this.screenBuffer[r].fill(' ');
                    }
                    this.cursorRow = 0;
                    this.cursorCol = 0;
                }
                break;
            case 'K':
                if (params === '0' || params === '') {
                    if (this.cursorRow >= 0 && this.cursorRow < this.terminalRows) {
                        this.screenBuffer[this.cursorRow].fill(' ', this.cursorCol, this.terminalCols);
                    }
                }
                break;
        }
    }

    scrollUpBuffer() {
        for (let i = 0; i < this.terminalRows - 1; i++) {
            this.screenBuffer[i] = [...this.screenBuffer[i + 1]];
        }
        this.screenBuffer[this.terminalRows - 1].fill(' ');
    }

    triggerRequestRender() {
        if (!this.isRenderPending) {
            this.isRenderPending = true;
            this.renderTimeout = setTimeout(() => {
                this.renderActual();
            }, 30);
        }
    }

    renderActual() {
        this.isRenderPending = false;
        let fullLines = [];
        for (let i = 0; i < this.terminalRows; i++) {
            const rowStr = this.screenBuffer[i].join('').trimEnd();
            fullLines.push(rowStr);
        }
        
        this.element.textContent = fullLines.join('\n');
        this.element.scrollTop = this.element.scrollHeight;

        this.parseMenuFromScreen();
    }

    /**
     * 🎯 修正 3 & 4：智慧過濾尾部減號裝飾線，並放寬正則以相容 (CR) 等英文選單
     */
    parseMenuFromScreen() {
        let foundLines = [];
        for (let i = 0; i < this.terminalRows; i++) {
            let line = this.screenBuffer[i].join('').trim();
            
            // 剔除尾端的減號 (-)、等號 (=) 與空白裝飾
            line = line.replace(/[-_=\s]+$/, '');
            
            // 放寬正則：允許括號內有英文和數字，如 (9) 或 (CR) 均能被匹配
            const isMenuPattern = /^\([a-zA-Z0-9]+\)|^\d+\./.test(line);
            if (isMenuPattern) {
                if (!foundLines.includes(line)) {
                    foundLines.push(line);
                }
            }
        }
        
        if (foundLines.length > 0) {
            const currentButtons = Array.from(menuGrid.querySelectorAll('button')).map(btn => btn.innerText);
            const isSame = currentButtons.length === foundLines.length && 
                           currentButtons.every((val, index) => val === foundLines[index]);
            if (!isSame) {
                renderUiMenu(foundLines);
            }
        }
    }

    clearTerminal() {
        if (this.renderTimeout) clearTimeout(this.renderTimeout);
        this.isRenderPending = false;
        for (let r = 0; r < this.terminalRows; r++) {
            this.screenBuffer[r].fill(' ');
        }
        this.cursorRow = 0;
        this.cursorCol = 0;
        this.currentState = this.ParserState.NORMAL;
        this.element.textContent = '';
    }
}

const terminalBox = document.getElementById('terminal-box');
const menuGrid = document.getElementById('ui-menu-grid');
const encodeBtn = document.getElementById('encode-btn');
const connStatus = document.getElementById('conn-status');
const hardwareId = document.getElementById('hardware-id');
const cmdInput = document.getElementById('cmd-input');
const sendBtn = document.getElementById('send-btn');
const menuPlaceholder = document.getElementById('menu-placeholder');

const g_terminal = new TerminalView(terminalBox);

let currentEncoding = 'ASCII';
let isConnected = false;

let g_device = null;
let g_gattServer = null;
let g_rxCharacteristic = null;
let g_txCharacteristic = null;

async function handleConnectionClick() {
    if (!isConnected) {
        await connectToHardware();
    } else {
        await disconnectHardware();
    }
}

async function connectToHardware() {
    try {
        if (!navigator.bluetooth) {
            alert("此瀏覽器不支援 Web Bluetooth API。請確保網址是 https:// 並使用 Chrome/Edge 或 Bluefy 瀏覽器。");
            return;
        }

        connStatus.innerText = "[連線中...]";
        connStatus.className = "status-btn connecting";
        hardwareId.innerText = "線材識別：啟動藍牙搜尋器...";
        appendLogToTerminal(`[系統]: 呼叫 Web Bluetooth 組件...`);

        g_device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
        });

        if (!g_device) {
            appendLogToTerminal("[系統]: 使用者取消了選擇。");
            resetConnectionUi();
            return;
        }

        hardwareId.innerText = `已選取: ${g_device.name || '未命名'}`;
        appendLogToTerminal(`[系統]: 正在與 GATT 伺服器建立握手...`);
        g_gattServer = await g_device.gatt.connect();

        appendLogToTerminal(`[系統]: 連線成功！硬體指示燈應常亮。強制等待 1 秒讓晶片穩定...`);
        await new Promise(resolve => setTimeout(resolve, 1000));

        appendLogToTerminal(`[系統]: 正在獲取 FFE0 服務...`);
        let service;
        try {
            service = await g_gattServer.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
        } catch (e) {
            appendLogToTerminal(`\n❌ [嚴重錯誤]: 找不到 FFE0 服務！該晶片可能修改了預設 UUID。`);
            appendLogToTerminal(`[系統]: 正在掃描並列出此設備的所有服務以供除錯...`);
            const services = await g_gattServer.getPrimaryServices();
            services.forEach(s => appendLogToTerminal(`  -> 發現服務 UUID: ${s.uuid}`));
            throw new Error("晶片服務 UUID 不符合預設值。");
        }

        appendLogToTerminal(`[系統]: 正在獲取 FFE1 特徵值...`);
        let ffe1Char;
        try {
            ffe1Char = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
        } catch (e) {
            appendLogToTerminal(`❌ [嚴重錯誤]: 在 FFE0 服務中找不到 FFE1 特徵值！`);
            throw e;
        }

        g_rxCharacteristic = ffe1Char;
        g_txCharacteristic = ffe1Char;

        isConnected = true;
        connStatus.innerText = "[已連線]";
        connStatus.className = "status-btn connected";
        hardwareId.innerText = `已連接: ${g_device.name || '序列埠設備'}`;
        cmdInput.disabled = false;
        cmdInput.placeholder = "請輸入空調控制指令...";
        sendBtn.disabled = false;
        menuPlaceholder.innerText = "已確認連線，等待設備回傳數據...";

        g_device.addEventListener('gattserverdisconnected', onDeviceDisconnected);

        appendLogToTerminal(`[系統]: 正在綁定 FFE1 資料接收接頭...`);
        g_rxCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
            try {
                const value = event.target.value;
                if (!value) return;

                const rawBytes = new Uint8Array(value.buffer, value.byteOffset, value.byteLength);
                const hexStr = Array.from(rawBytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
                console.log(`[物理收包 (HEX)]: ${hexStr}`);

                let chunk = decodeDataView(value);
                
                if (g_terminal) {
                    g_terminal.writeText(chunk);
                }
            } catch (err) {
                console.error(`❌ [處理收包時崩潰]: ${err.message}`);
            }
        });

        appendLogToTerminal(`[系統]: 正在寫入 0x2902 CCCD 以開啟藍牙通知...`);
        await g_rxCharacteristic.startNotifications();
        appendLogToTerminal(`[系統]: 🎉 藍牙序列埠通道成功打通！可以開始收發！`);

        appendLogToTerminal(`[系統]: 正在發送自動敲門訊號...`);
        await sendBle232RawCmd("");

    } catch (error) {
        console.error(error);
        appendLogToTerminal(`\n❌ [連線失敗]: ${error.message}\n`);
        resetConnectionUi();
    }
}

function resetConnectionUi() {
    isConnected = false;
    connStatus.innerText = "[未連線]";
    connStatus.className = "status-btn";
    hardwareId.innerText = "線材識別：等待網頁藍牙連線...";
}

function onDeviceDisconnected() {
    appendLogToTerminal("\n⚠️ [警報]: 藍牙連線已斷開！\n");
    resetConnectionUi();
    cmdInput.disabled = true;
    sendBtn.disabled = true;
}

async function sendBle232RawCmd(cmdText) {
    if (!g_txCharacteristic) return;
    try {
        const fullText = cmdText + "\r";
        const encoder = new TextEncoder();
        const data = encoder.encode(fullText);

        if (g_txCharacteristic.properties.writeWithoutResponse) {
            await g_txCharacteristic.writeValueWithoutResponse(data);
        } else {
            await g_txCharacteristic.writeValueWithResponse(data);
        }
    } catch (error) {
        appendLogToTerminal(`❌ [發送失敗]: ${error.message}`);
    }
}

function sendManualCmd() {
    const input = document.getElementById('cmd-input');
    const cleanValue = input.value.trim();
    if (cleanValue && isConnected) {
        appendLogToTerminal(`\n[手動發送]: ${cleanValue}`);
        sendBle232RawCmd(cleanValue);
        input.value = '';
    }
}

function executeCommand(cmdNum) {
    if (!isConnected) return;
    appendLogToTerminal(`\n[選單指令]: ${cmdNum}`);
    sendBle232RawCmd(cmdNum);
}

async function disconnectHardware() {
    if (g_device && g_device.gatt.connected) {
        g_device.gatt.disconnect();
    }
    isConnected = false;
    if (g_terminal) {
        g_terminal.clearTerminal();
    }
    resetConnectionUi();

    menuGrid.innerHTML = '<div style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先建立藍牙連線...</div>';
    appendLogToTerminal("\n[系統]: 已安全中斷連線。\n");
}

function clearConsole() {
    if (g_terminal) {
        g_terminal.clearTerminal();
    }
    if (isConnected) {
        menuGrid.innerHTML = '<div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">畫面已清除，正在重新呼叫選單...</div>';
        sendBle232RawCmd("");
    } else {
        menuGrid.innerHTML = '<div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先建立藍牙連線...</div>';
    }
    appendLogToTerminal("[系統]: 畫面已清除，重新發送敲門訊號。");
}

/**
 * 🎯 修正 5：智慧提取指令，相容數字與英文（如點擊 (CR) 會提取出 CR）
 */
function renderUiMenu(lines) {
    menuGrid.innerHTML = '';
    lines.forEach(line => {
        let cmdNumber = '';
        const parenMatch = line.match(/^\(([^)]+)\)/); // 提取括號內的文字，例如 "9"、"CR"
        const dotMatch = line.match(/^(\d+)\./);       // 提取點號前數字，例如 "1"
        
        if (parenMatch) {
            cmdNumber = parenMatch[1];
        } else if (dotMatch) {
            cmdNumber = dotMatch[1];
        }

        const btn = document.createElement('button');
        btn.innerText = line;
        btn.onclick = () => {
            executeCommand(cmdNumber);
        };
        menuGrid.appendChild(btn);
    });
}

function decodeDataView(dataView) {
    const encodingMode = currentEncoding === 'BIG5' ? 'big5' : 'ascii';
    const decoder = new TextDecoder(encodingMode);
    const uint8 = new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength);
    return decoder.decode(uint8);
}

function toggleEncoding() {
    currentEncoding = currentEncoding === 'ASCII' ? 'BIG5' : 'ASCII';
    encodeBtn.innerText = currentEncoding;
    appendLogToTerminal(`\n[系統]: 解碼變更為 ${currentEncoding}\n`);
}

function appendLogToTerminal(text) {
    if (g_terminal) {
        g_terminal.writeText(text + "\n");
    }
}
</script>
</body>
</html>
