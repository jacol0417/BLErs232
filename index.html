<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空調系統重置 - WebApp 優化版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: #004d40;
            color: #ffffff;
            text-align: center;
            padding: 12px 0;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 藍色控制面板 */
        .control-panel {
            background-color: #0d47a1;
            margin: 12px;
            padding: 14px;
            border-radius: 8px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            color: #ff5252;
            font-weight: bold;
            margin-bottom: 16px;
            font-size: 14px;
        }
        /* 狀態文字改為可點擊的按鈕樣式 */
        .status-btn {
            background: transparent;
            border: 1px solid #69f0ae;
            color: #69f0ae;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .status-btn:active {
            background-color: rgba(105, 240, 174, 0.2);
        }
        
        .config-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: #69f0ae;
            font-size: 14px;
            margin-bottom: 16px;
        }
        /* 編碼切換按鈕樣式 */
        .encode-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid #69f0ae;
            color: #69f0ae;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid #546e7a;
            color: #ffffff;
            padding: 6px 4px;
            font-size: 16px;
            outline: none;
        }
        .input-group input::placeholder { color: #b0bec5; }
        .input-group button {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 12px;
        }

        /* 功能選單區 */
        .menu-section {
            padding: 0 12px;
            margin-bottom: 8px;
        }
        .menu-title {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            contain: content; 
        }
        .menu-grid button {
            background-color: #1e1e1e;
            color: #69f0ae;
            border: 1px solid #333333;
            padding: 10px;
            border-radius: 4px;
            text-align: left;
            font-size: 13px;
            font-family: monospace;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .menu-grid button:active {
            background-color: #333333;
        }

        /* 接收控制台 */
        .console-section {
            flex: 1;
            margin: 0 12px 12px 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .console-title {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .terminal {
            flex: 1;
            background-color: #000000;
            border: 1px solid #222222;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff00;
            line-height: 1.4;
            overflow-y: scroll;
            white-space: pre-wrap;
            word-break: break-all;
            -webkit-overflow-scrolling: touch; 
        }
    </style>
</head>
<body>

    <div class="header">空調系統重置</div>

    <div class="control-panel">
        <div class="status-row">
            <span>線材識別：藍牙 RS232 模式</span>
            <button class="status-btn" id="conn-status" onclick="simulateIncomingData()">[已連線]</button>
        </div>
        <div class="config-row">
            <span>編碼：<button class="encode-toggle" id="encode-btn" onclick="toggleEncoding()">ASCII</button></span>
        </div>
        <div class="input-group">
            <input type="text" id="cmd-input" placeholder="請輸入指令">
            <button onclick="sendManualCmd()">傳送</button>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-title">功能選單 (解析自硬體訊號，點擊即傳送)</div>
        <div class="menu-grid" id="ui-menu-grid">
            <div style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">等待硬體回傳選單... (或點擊右上角連線狀態模擬)</div>
        </div>
    </div>

    <div class="console-section">
        <div class="console-title">接收控制台 (原始資料流)</div>
        <div class="terminal" id="terminal-box"></div>
    </div>

    <script>
        const terminalBox = document.getElementById('terminal-box');
        const menuGrid = document.getElementById('ui-menu-grid');
        const encodeBtn = document.getElementById('encode-btn');
        const connStatus = document.getElementById('conn-status');
        
        let menuRawLines = [];
        let isMenuParsed = false;
        let maxLogLines = 200; 
        let currentEncoding = 'ASCII';

        // 編碼切換邏輯 (ASCII <-> BIG5)
        function toggleEncoding() {
            if (currentEncoding === 'ASCII') {
                currentEncoding = 'BIG5';
            } else {
                currentEncoding = 'ASCII';
            }
            encodeBtn.innerText = currentEncoding;
            appendLogToTerminal(`\n[系統通知]: 已切換文字解碼格式為 ${currentEncoding}\n`);
            
            // 實際專案中，這裡會去改變藍牙數據流的 TextDecoder('big5' 或 'ascii')
        }

        // 資料過濾路由器 (Data Router)
        function processIncomingLine(line) {
            const trimmedLine = line.trim();
            if (!trimmedLine) return;

            appendLogToTerminal(line);

            const isMenuPattern = /^\(\d+\)|^\d+\./.test(trimmedLine);

            if (isMenuPattern) {
                if (!isMenuParsed) {
                    if (!menuRawLines.includes(trimmedLine)) {
                        menuRawLines.push(trimmedLine);
                    }
                    
                    clearTimeout(window.menuRenderTimer);
                    window.menuRenderTimer = setTimeout(() => {
                        renderUiMenu(menuRawLines);
                        isMenuParsed = true; 
                    }, 200);
                }
            }
        }

        function renderUiMenu(lines) {
            menuGrid.innerHTML = ''; 
            lines.forEach(line => {
                const match = line.match(/\d+/);
                const cmdNumber = match ? match[0] : '';

                const btn = document.createElement('button');
                btn.innerText = line;
                btn.onclick = () => {
                    executeCommand(cmdNumber, line);
                };
                menuGrid.appendChild(btn);
            });
        }

        function executeCommand(cmdNum, fullText) {
            appendLogToTerminal(`\n[WebApp 發送指令]: ${cmdNum}\n`);
            alert(`已依據編碼 [${currentEncoding}] 向隨附裝置發送指令: ${cmdNum}`);
        }

        function sendManualCmd() {
            const input = document.getElementById('cmd-input');
            if(input.value) {
                executeCommand(input.value, '手動輸入');
                input.value = '';
            }
        }

        function appendLogToTerminal(text) {
            const p = document.createElement('div');
            p.innerText = text;
            terminalBox.appendChild(p);

            if (terminalBox.children.length > maxLogLines) {
                terminalBox.removeChild(terminalBox.firstChild);
            }
            terminalBox.scrollTop = terminalBox.scrollHeight;
        }

        // 模擬數據
        function simulateIncomingData() {
            isMenuParsed = false;
            menuRawLines = [];
            terminalBox.innerHTML = '';
            
            // 模擬點擊時的連線狀態變化
            connStatus.innerText = "[接收中...]";
            appendLogToTerminal("--- 開始接收設備資料流 ---");

            let timeTicker = setInterval(() => {
                const now = new Date();
                const timestamp = `[${now.toLocaleTimeString()}.${String(now.getMilliseconds()).padStart(3, '0')}] SYSTEM_RUNNING...`;
                processIncomingLine(timestamp);
            }, 300);

            setTimeout(() => {
                appendLogToTerminal("\n-------------------------------------------");
                processIncomingLine("USER LEVEL ACCESS");
                processIncomingLine("(1)  Status Screen");
                processIncomingLine("(2)  Digital Inputs Monitor");
                processIncomingLine("(3)  Digital Outputs Monitor");
                processIncomingLine("(4)  Analogue I/O Monitor");
                processIncomingLine("(5)  Communications Monitor");
                processIncomingLine("(6)  Test Functions");
                processIncomingLine("(7)  Reset Alarms & Test Functions");
                processIncomingLine("(8)  Download Event Log");
                processIncomingLine("(9)  Download Data Log");
                processIncomingLine("(10) Dwnload Test Log");
                processIncomingLine("(11) Change Access Level");
                appendLogToTerminal("-------------------------------------------\n");
            }, 1500);

            setTimeout(() => {
                clearInterval(timeTicker);
                appendLogToTerminal("\n--- 模擬結束 ---");
                connStatus.innerText = "[已連線]";
            }, 15000);
        }
    </script>
</body>
</html>
