<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>串口原始監聽器</title>
    
    <style>
        body { margin: 0; padding: 0; background-color: #000000; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background-color: #1a1a1a; text-align: center; padding: 10px 0; font-weight: bold; border-bottom: 1px solid #333; }
        .control-panel { background-color: #1a1a1a; padding: 10px; display: flex; gap: 10px; }
        .terminal { flex: 1; padding: 10px; overflow-y: scroll; white-space: pre-wrap; word-break: break-all; }
        button { background: #333; color: #fff; border: 1px solid #666; padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">原始串口監聽器 (無解析)</div>
    
    <div class="control-panel">
        <button id="conn-btn" onclick="handleConnection()">啟動藍牙監聽</button>
        <button onclick="document.getElementById('terminal-box').innerHTML = ''">清除畫面</button>
    </div>

    <div class="terminal" id="terminal-box">[系統]: 準備就緒，請點擊啟動監聽...</div>

    <script>
        let g_txCharacteristic = null;

        async function handleConnection() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                g_txCharacteristic = char;
                document.getElementById('conn-btn').innerText = "已連線";
                appendLog("[系統]: 連線成功，顯示原始資料流：\n");
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    // 直接解碼並顯示，不做任何過濾
                    let decoder = new TextDecoder('ascii');
                    let rawData = decoder.decode(event.target.value);
                    appendLog(rawData);
                });
            } catch (e) {
                appendLog("\n[錯誤]: " + e);
            }
        }

        function appendLog(text) {
            const term = document.getElementById('terminal-box');
            term.innerHTML += text;
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
