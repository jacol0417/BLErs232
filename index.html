<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空調系統重置 - 真實連線狀態版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: #004d40;
            color: #ffffff;
            text-align: center;
            padding: 12px 0;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 藍色控制面板 */
        .control-panel {
            background-color: #0d47a1;
            margin: 12px;
            padding: 14px;
            border-radius: 8px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        /* 狀態按鈕：預設未連線（紅色） */
        .status-btn {
            background: transparent;
            border: 1px solid #ff5252;
            color: #ff5252;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        /* 連線成功後的樣式（綠色） */
        .status-btn.connected {
            border-color: #69f0ae;
            color: #69f0ae;
        }
        /* 連線中狀態（黃色） */
        .status-btn.connecting {
            border-color: #ffd740;
            color: #ffd740;
        }

        .config-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: #69f0ae;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .encode-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid #69f0ae;
            color: #69f0ae;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid #546e7a;
            color: #ffffff;
            padding: 6px 4px;
            font-size: 16px;
            outline: none;
        }
        .input-group input:disabled {
            border-bottom: 2px solid #37474f;
            color: #555555;
        }
        .input-group input::placeholder { color: #b0bec5; }
        .input-group button {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 12px;
        }
        .input-group button:disabled {
            color: #555555;
            cursor: not-allowed;
        }

        /* 功能選單區 */
        .menu-section {
            padding: 0 12px;
            margin-bottom: 8px;
        }
        .menu-title {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            contain: content; 
        }
        .menu-grid button {
            background-color: #1e1e1e;
            color: #69f0ae;
            border: 1px solid #333333;
            padding: 10px;
            border-radius: 4px;
            text-align: left;
            font-size: 13px;
            font-family: monospace;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .menu-grid button:active { background-color: #333333; }

        /* 接收控制台 */
        .console-section {
            flex: 1;
            margin: 0 12px 12px 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .console-title {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .terminal {
            flex: 1;
            background-color: #000000;
            border: 1px solid #222222;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff00;
            line-height: 1.4;
            overflow-y: scroll;
            white-space: pre-wrap;
            word-break: break-all;
            -webkit-overflow-scrolling: touch; 
        }
    </style>
</head>
<body>

    <div class="header">空調系統重置</div>

    <div class="control-panel">
        <div class="status-row">
            <span id="hardware-id">線材識別：等待藍牙序列埠連線...</span>
            <button class="status-btn" id="conn-status" onclick="handleConnectionClick()">[未連線]</button>
        </div>
        <div class="config-row">
            <span>編碼：<button class="encode-toggle" id="encode-btn" onclick="toggleEncoding()">ASCII</button></span>
        </div>
        <div class="input-group">
            <input type="text" id="cmd-input" placeholder="請先連接硬體設備..." disabled>
            <button id="send-btn" onclick="sendManualCmd()" disabled>傳送</button>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-title">功能選單 (解析自硬體訊號，點擊即傳送)</div>
        <div class="menu-grid" id="ui-menu-grid">
            <div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先點擊右上角狀態按鈕建立藍牙連接...</div>
        </div>
    </div>

    <div class="console-section">
        <div class="console-title">接收控制台 (原始資料流)</div>
        <div class="terminal" id="terminal-box"></div>
    </div>

    <script>
        const terminalBox = document.getElementById('terminal-box');
        const menuGrid = document.getElementById('ui-menu-grid');
        const encodeBtn = document.getElementById('encode-btn');
        const connStatus = document.getElementById('conn-status');
        const hardwareId = document.getElementById('hardware-id');
        const cmdInput = document.getElementById('cmd-input');
        const sendBtn = document.getElementById('send-btn');
        const menuPlaceholder = document.getElementById('menu-placeholder');
        
        let menuRawLines = [];
        let isMenuParsed = false;
        let maxLogLines = 200; 
        let currentEncoding = 'ASCII';
        let isConnected = false; // 真實連線狀態旗標
        let timeTicker = null;

        // 主連線按鈕點擊處理
        function handleConnectionClick() {
            if (!isConnected) {
                // 執行連線流程
                startConnectionProcess();
            } else {
                // 執行斷線流程
                disconnectProcess();
            }
        }

        // 模擬藍牙連線與交握
        function startConnectionProcess() {
            // 1. 進入「連線中」狀態
            connStatus.innerText = "[連線中...]";
            connStatus.className = "status-btn connecting";
            hardwareId.innerText = "線材識別：正在搜尋藍牙序列埠...";
            appendLogToTerminal("[系統]: 開始搜尋周邊藍牙 RS232 轉接器...");

            // 2. 模擬 1.5 秒後藍牙成功配對（交握確認）
            setTimeout(() => {
                isConnected = true;
                connStatus.innerText = "[已連線]";
                connStatus.className = "status-btn connected";
                hardwareId.innerText = "線材識別：藍牙 RS232 模式 (BT-Serial_v2)";
                appendLogToTerminal("[系統]: 藍牙配對成功！已與 RS232 晶片建立通道 (BaudRate: 57600)。");
                
                // 解鎖輸入框與傳送按鈕
                cmdInput.disabled = false;
                cmdInput.placeholder = "請輸入指令";
                sendBtn.disabled = false;
                menuPlaceholder.innerText = "已連線，等待硬體回傳選單數據...";

                // 3. 連線確認成功後，設備才正式開始源源不絕傳送資料
                startHardwareStream();
            }, 1500);
        }

        // 斷開連線
        function disconnectProcess() {
            clearInterval(timeTicker);
            isConnected = false;
            isMenuParsed = false;
            menuRawLines = [];
            
            // 恢復初始 UI
            connStatus.innerText = "[未連線]";
            connStatus.className = "status-btn";
            hardwareId.innerText = "線材識別：等待藍牙序列埠連線...";
            cmdInput.disabled = true;
            cmdInput.value = "";
            cmdInput.placeholder = "請先連接硬體設備...";
            sendBtn.disabled = true;
            
            menuGrid.innerHTML = '<div style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先點擊右上角狀態按鈕建立藍牙連接...</div>';
            appendLogToTerminal("\n[系統]: 藍牙連線已中斷。\n");
        }

        // 設備資料串流開始
        function startHardwareStream() {
            appendLogToTerminal("--- 開始接收設備資料流 ---");

            // 每 300 毫秒噴發一次時間戳記
            timeTicker = setInterval(() => {
                const now = new Date();
                const timestamp = `[${now.toLocaleTimeString()}.${String(now.getMilliseconds()).padStart(3, '0')}] SYSTEM_RUNNING...`;
                processIncomingLine(timestamp);
            }, 300);

            // 1 秒後硬體吐出選單字串
            setTimeout(() => {
                if(!isConnected) return; // 預防在等待期就被使用者點斷線
                appendLogToTerminal("\n-------------------------------------------");
                processIncomingLine("USER LEVEL ACCESS");
                processIncomingLine("(1)  Status Screen");
                processIncomingLine("(2)  Digital Inputs Monitor");
                processIncomingLine("(3)  Digital Outputs Monitor");
                processIncomingLine("(4)  Analogue I/O Monitor");
                processIncomingLine("(5)  Communications Monitor");
                processIncomingLine("(6)  Test Functions");
                processIncomingLine("(7)  Reset Alarms & Test Functions");
                processIncomingLine("(8)  Download Event Log");
                processIncomingLine("(9)  Download Data Log");
                processIncomingLine("(10) Dwnload Test Log");
                processIncomingLine("(11) Change Access Level");
                appendLogToTerminal("-------------------------------------------\n");
            }, 1000);
        }

        // 資料過濾路由器 (Data Router)
        function processIncomingLine(line) {
            const trimmedLine = line.trim();
            if (!trimmedLine) return;

            appendLogToTerminal(line);

            const isMenuPattern = /^\(\d+\)|^\d+\./.test(trimmedLine);

            if (isMenuPattern) {
                if (!isMenuParsed) {
                    if (!menuRawLines.includes(trimmedLine)) {
                        menuRawLines.push(trimmedLine);
                    }
                    
                    clearTimeout(window.menuRenderTimer);
                    window.menuRenderTimer = setTimeout(() => {
                        renderUiMenu(menuRawLines);
                        isMenuParsed = true; 
                    }, 200);
                }
            }
        }

        function renderUiMenu(lines) {
            menuGrid.innerHTML = ''; 
            lines.forEach(line => {
                const match = line.match(/\d+/);
                const cmdNumber = match ? match[0] : '';

                const btn = document.createElement('button');
                btn.innerText = line;
                btn.onclick = () => {
                    executeCommand(cmdNumber, line);
                };
                menuGrid.appendChild(btn);
            });
        }

        function executeCommand(cmdNum, fullText) {
            if(!isConnected) return;
            appendLogToTerminal(`\n[WebApp 發送指令]: ${cmdNum}\n`);
            alert(`已依據編碼 [${currentEncoding}] 向隨附裝置發送指令: ${cmdNum}`);
        }

        function sendManualCmd() {
            const input = document.getElementById('cmd-input');
            if(input.value && isConnected) {
                executeCommand(input.value, '手動輸入');
                input.value = '';
            }
        }

        function appendLogToTerminal(text) {
            const p = document.createElement('div');
            p.innerText = text;
            terminalBox.appendChild(p);

            if (terminalBox.children.length > maxLogLines) {
                terminalBox.removeChild(terminalBox.firstChild);
            }
            terminalBox.scrollTop = terminalBox.scrollHeight;
        }

        function toggleEncoding() {
            if (currentEncoding === 'ASCII') {
                currentEncoding = 'BIG5';
            } else {
                currentEncoding = 'ASCII';
            }
            encodeBtn.innerText = currentEncoding;
            appendLogToTerminal(`\n[系統通知]: 已切換文字解碼格式為 ${currentEncoding}\n`);
        }
    </script>
</body>
</html>
