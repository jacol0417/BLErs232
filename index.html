<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空調系統重置PWA版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body {
            margin: 0; padding: 0; background-color: #121212; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .header { background-color: #004d40; color: #ffffff; text-align: center; padding: 12px 0; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        
        /* 藍色控制面板 */
        .control-panel { background-color: #0d47a1; margin: 12px; padding: 14px; border-radius: 8px; }
        
        /* 第一列：線材識別與連線狀態並排 */
        .hardware-row { 
            display: flex; justify-content: space-between; align-items: center; 
            color: #ffffff; font-weight: bold; font-size: 14px; margin-bottom: 12px; 
        }
        .hardware-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
        
        /* 第二列：編碼、波特率 與 同步按鈕並排 */
        .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; }
        .setting-group { display: flex; align-items: center; gap: 10px; color: #69f0ae; font-size: 14px; }
        
        .encode-toggle { background: rgba(255,255,255,0.1); border: 1px solid #69f0ae; color: #69f0ae; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .baud-select {
            background: #121212; border: 1px solid #69f0ae; color: #69f0ae; 
            padding: 4px 6px; border-radius: 4px; font-weight: bold; outline: none; cursor: pointer;
        }
        .baud-select:disabled {
            border-color: #37474f; color: #555555; cursor: not-allowed; background: transparent;
        }

        /* 同步 Baud 按鈕（在 Baud 右側） */
        #sync-baud-btn { 
            background: transparent; border: 1px solid #ffd740; color: #ffd740; 
            padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;
            white-space: nowrap; flex-shrink: 0;
        }
        #sync-baud-btn:disabled { color: #555555; border-color: #37474f; cursor: not-allowed; }

        /* 連線狀態按鈕（在線材識別右側） */
        .status-btn {
            background: transparent; border: 1px solid #ff5252; color: #ff5252;
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s ease;
            white-space: nowrap; flex-shrink: 0;
        }
        .status-btn.connected { border-color: #69f0ae; color: #69f0ae; }
        .status-btn.connecting { border-color: #ffd740; color: #ffd740; }

        /* 第三列：純輸入與操作按鈕 */
        .input-group { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
        
        .input-group input { 
            flex: 1; 
            min-width: 80px;
            background: transparent; border: none; border-bottom: 2px solid #546e7a; 
            color: #ffffff; padding: 6px 4px; font-size: 16px; outline: none; 
        }
        .input-group input:disabled { border-bottom: 2px solid #37474f; color: #555555; }
        
        .input-group button { 
            background: transparent; border: 1px solid #ffffff; border-radius: 4px;
            color: #ffffff; font-size: 14px; cursor: pointer; 
            padding: 6px 12px; 
            white-space: nowrap; 
            flex-shrink: 0; 
        }
        .input-group button:disabled { color: #555555; border-color: #37474f; cursor: not-allowed; }
        
        #clear-btn { color: #ffb74d; border-color: #ffb74d; } 
        #clear-btn:disabled { color: #555555; border-color: #37474f; }
        
        #send-btn { color: #69f0ae; border-color: #69f0ae; }
        #send-btn:disabled { color: #555555; border-color: #37474f; }

        /* 功能選單區 */
        .menu-section { padding: 0 12px; margin-bottom: 8px; }
        .menu-title { color: #aaaaaa; font-size: 14px; margin-bottom: 6px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 180px; overflow-y: auto; contain: content; }
        .menu-grid button { background-color: #1e1e1e; color: #69f0ae; border: 1px solid #333333; padding: 10px; border-radius: 4px; text-align: left; font-size: 13px; font-family: monospace; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .menu-grid button:active { background-color: #333333; }

        /* 接收控制台 */
        .console-section { flex: 1; margin: 0 12px 12px 12px; display: flex; flex-direction: column; overflow: hidden; }
        .console-title { color: #aaaaaa; font-size: 14px; margin-bottom: 4px; }
        .terminal { flex: 1; background-color: #000000; border: 1px solid #222222; padding: 8px; font-family: monospace; font-size: 12px; color: #00ff00; line-height: 1.4; overflow-y: scroll; white-space: pre-wrap; word-break: break-all; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>

    <div class="header">空調系統重置</div>

    <div class="control-panel">
        <div class="hardware-row">
            <div class="hardware-title" id="hardware-id">線材識別：等待藍牙序列埠連線...</div>
            <button class="status-btn" id="conn-status" onclick="handleConnectionClick()">[未連線]</button>
        </div>
        
        <div class="config-row">
            <div class="setting-group">
                <span>編碼：<button class="encode-toggle" id="encode-btn" onclick="toggleEncoding()">ASCII</button></span>
                <span>Baud：
                    <select class="baud-select" id="baud-rate-select" onchange="handleBaudChange()">
                        <option value="9600">9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600" selected>57600</option>
                        <option value="115200">115200</option>
                    </select>
                </span>
            </div>
            <button id="sync-baud-btn" onclick="syncHardwareBaud()" disabled>同步Baud</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="cmd-input" placeholder="請先連接硬體..." disabled>
            <button id="clear-btn" onclick="clearConsole()">清除</button>
            <button id="send-btn" onclick="sendManualCmd()" disabled>傳送</button>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-title">功能選單 (解析自硬體訊號，點擊即傳送)</div>
        <div class="menu-grid" id="ui-menu-grid">
            <div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先建立藍牙連線...</div>
        </div>
    </div>

    <div class="console-section">
        <div class="console-title">接收控制台 (原始資料流)</div>
        <div class="terminal" id="terminal-box"></div>
    </div>

    <script>
        // 🌟 核心：註冊 Service Worker 以實現 iOS 主畫面完全離線執行
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA 離線快取支援成功啟用！', reg))
                    .catch(err => console.error('PWA 註冊失敗：', err));
            });
        }

        const { BleClient } = window.Capacitor?.Plugins || {};

        const terminalBox = document.getElementById('terminal-box');
        const menuGrid = document.getElementById('ui-menu-grid');
        const encodeBtn = document.getElementById('encode-btn');
        const baudSelect = document.getElementById('baud-rate-select');
        const connStatus = document.getElementById('conn-status');
        const hardwareId = document.getElementById('hardware-id');
        const cmdInput = document.getElementById('cmd-input');
        const sendBtn = document.getElementById('send-btn');
        const syncBaudBtn = document.getElementById('sync-baud-btn');
        const menuPlaceholder = document.getElementById('menu-placeholder');
        
        let menuRawLines = [];
        let isMenuParsed = false;
        let maxLogLines = 200; 
        let currentEncoding = 'ASCII';
        let isConnected = false;
        let activeDevice = null;
        let dataBuffer = ""; 

        function handleBaudChange() {
            appendLogToTerminal(`[設定提示]: 目標波特率已選定為 ${baudSelect.value}。`);
        }

        async function handleConnectionClick() {
            if (!isConnected) {
                await connectToHardware();
            } else {
                await disconnectHardware();
            }
        }

        // 增強除錯版的連線函式
        async function connectToHardware() {
            try {
                // 防呆檢查：確認 BleClient 模組是否存在
                if (!BleClient) {
                    alert("【系統錯誤】: 找不到 Capacitor 藍牙外掛。請確認此網頁是否已正確打包為 App，或檢查是否處於 HTTPS 環境！");
                    resetConnectionUi();
                    return;
                }

                baudSelect.disabled = true;
                connStatus.innerText = "[連線中...]";
                connStatus.className = "status-btn connecting";
                hardwareId.innerText = "線材識別：啟動藍牙掃描...";
                appendLogToTerminal(`[系統]: 正在初始化藍牙模組 (預計目標速率: ${baudSelect.value})...`);

                await BleClient.initialize();

                // 彈出系統藍牙選擇視窗
                activeDevice = await BleClient.requestDevice({
                    acceptAllDevices: true 
                });

                // 如果使用者在系統視窗點了取消
                if (!activeDevice) {
                    alert("未選擇任何藍牙裝置");
                    resetConnectionUi();
                    return;
                }

                hardwareId.innerText = `已連接: ${activeDevice.name || '未命名裝置'}`;
                await BleClient.connect(activeDevice.deviceId);

                const services = await BleClient.getServices(activeDevice.deviceId);
                const targetService = services[0]?.uuid;
                const targetChar = services[0]?.characteristics[0]?.uuid;

                if (!targetService || !targetChar) {
                    throw new Error("無法辨識該模組的序列埠通道");
                }

                isConnected = true;
                connStatus.innerText = "[已連線]";
                connStatus.className = "status-btn connected";
                
                cmdInput.disabled = false;
                cmdInput.placeholder = "請輸入指令 (例如: BAUD=?)";
                sendBtn.disabled = false;
                syncBaudBtn.disabled = false; 
                menuPlaceholder.innerText = "已確認連線，等待設備回傳數據...";

                window.CURRENT_SERVICE_UUID = targetService;
                window.CURRENT_CHAR_UUID = targetChar;

                await BleClient.startNotifications(
                    activeDevice.deviceId,
                    targetService,
                    targetChar,
                    (value) => {
                        let chunk = decodeDataView(value);
                        handleRawChunk(chunk);
                    }
                );

                appendLogToTerminal(`[系統]: 成功建立通道！正在自動發送 'AT' 驗證連線狀態...`);
                await sendBle232RawCmd("AT");

            } catch (error) {
                console.error("連線出錯：", error);
                // 這裡會跳出真實的錯誤原因（例如：User cancelled, Bluetooth disabled 等）
                alert("【藍牙連線異常】:\n" + (error.message || error));
                resetConnectionUi();
            }
        }

        // 抽取出來的 UI 重置輔助函式
        function resetConnectionUi() {
            isConnected = false;
            connStatus.innerText = "[未連線]";
            connStatus.className = "status-btn";
            hardwareId.innerText = "線材識別：等待藍牙序列埠連線...";
            baudSelect.disabled = false;
            syncBaudBtn.disabled = true;
        }

        async function syncHardwareBaud() {
            if (!isConnected) return;
            const targetBaud = baudSelect.value;
            appendLogToTerminal(`[系統]: 正在向 BLE232 發送波特率變更指令...`);
            await sendBle232RawCmd(`BAUD=${targetBaud}`);
            appendLogToTerminal(`[提示]: 已發送 BAUD=${targetBaud}，請確認控制台是否回傳 'OK'。`);
        }

        async function sendBle232RawCmd(cmdText) {
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(cmdText + "\r\n");
                await BleClient.write(
                    activeDevice.deviceId,
                    window.CURRENT_SERVICE_UUID,
                    window.CURRENT_CHAR_UUID,
                    data
                );
            } catch (error) {
                appendLogToTerminal(`[指令發送失敗]: ${error.message}`);
            }
        }

        function sendManualCmd() {
            const input = document.getElementById('cmd-input');
            if (input.value && isConnected) {
                appendLogToTerminal(`\n[手動發送]: ${input.value}\n`);
                await sendBle232RawCmd(input.value);
                input.value = '';
            }
        }

        async function executeCommand(cmdNum) {
            if (!isConnected) return;
            appendLogToTerminal(`\n[WebApp 選單指令]: ${cmdNum}\n`);
            await sendBle232RawCmd(cmdNum);
        }

        async function disconnectHardware() {
            if (activeDevice) {
                try {
                    await BleClient.stopNotifications(activeDevice.deviceId, window.CURRENT_SERVICE_UUID, window.CURRENT_CHAR_UUID);
                    await BleClient.disconnect(activeDevice.deviceId);
                } catch (e) { console.log("斷線清理異常", e); }
            }
            isConnected = false;
            isMenuParsed = false;
            menuRawLines = [];
            dataBuffer = "";
            
            connStatus.innerText = "[未連線]";
            connStatus.className = "status-btn";
            hardwareId.innerText = "線材識別：等待藍牙序列埠連線...";
            cmdInput.disabled = true;
            cmdInput.value = "";
            cmdInput.placeholder = "請先連接硬體...";
            sendBtn.disabled = true;
            syncBaudBtn.disabled = true; 
            baudSelect.disabled = false;

            menuGrid.innerHTML = '<div style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先建立藍牙連線...</div>';
            appendLogToTerminal("\n[系統]: 已安全斷開藍牙序列埠連線。\n");
        }

        function clearConsole() {
            terminalBox.innerHTML = '';
            isMenuParsed = false;
            menuRawLines = [];
            if (isConnected) {
                menuGrid.innerHTML = '<div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">畫面已清除，等待硬體下一筆選單數據...</div>';
            } else {
                menuGrid.innerHTML = '<div id="menu-placeholder" style="color: #666; grid-column: span 2; font-size: 12px; padding: 10px;">請先建立藍牙連線...</div>';
            }
            appendLogToTerminal("[系統]: 畫面與暫存選單已清除。");
        }

        function handleRawChunk(chunk) {
            dataBuffer += chunk;
            if (dataBuffer.includes('\n')) {
                let lines = dataBuffer.split('\n');
                dataBuffer = lines.pop(); 
                lines.forEach(line => {
                    processIncomingLine(line);
                });
            }
        }

        function processIncomingLine(line) {
            const trimmedLine = line.trim();
            if (!trimmedLine) return;

            appendLogToTerminal(line);

            const isMenuPattern = /^\(\d+\)|^\d+\./.test(trimmedLine);

            if (isMenuPattern) {
                if (!isMenuParsed) {
                    if (!menuRawLines.includes(trimmedLine)) {
                        menuRawLines.push(trimmedLine);
                    }
                    clearTimeout(window.menuRenderTimer);
                    window.menuRenderTimer = setTimeout(() => {
                        renderUiMenu(menuRawLines);
                        isMenuParsed = true; 
                    }, 250); 
                }
            }
        }

        function renderUiMenu(lines) {
            menuGrid.innerHTML = ''; 
            lines.forEach(line => {
                const match = line.match(/\d+/);
                const cmdNumber = match ? match[0] : '';

                const btn = document.createElement('button');
                btn.innerText = line;
                btn.onclick = () => {
                    executeCommand(cmdNumber);
                };
                menuGrid.appendChild(btn);
            });
        }

        function decodeDataView(dataView) {
            const encodingMode = currentEncoding === 'BIG5' ? 'big5' : 'ascii';
            const decoder = new TextDecoder(encodingMode);
            return decoder.decode(dataView);
        }

        function toggleEncoding() {
            currentEncoding = currentEncoding === 'ASCII' ? 'BIG5' : 'ASCII';
            encodeBtn.innerText = currentEncoding;
            appendLogToTerminal(`\n[系統通知]: 已將解碼編碼變更為 ${currentEncoding}\n`);
        }

        function appendLogToTerminal(text) {
            const p = document.createElement('div');
            p.innerText = text;
            terminalBox.appendChild(p);
            if (terminalBox.children.length > maxLogLines) {
                terminalBox.removeChild(terminalBox.firstChild);
            }
            terminalBox.scrollTop = terminalBox.scrollHeight;
        }
    </script>
</body>
</html>
