<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空調系統控制台 (穩定版)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .control-panel { background-color: #0d47a1; padding: 12px; }
        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        .input-group input { flex: 1; background: #000; border: 1px solid #555; color: #fff; padding: 8px; }
        .input-group button { padding: 8px 15px; cursor: pointer; }
        .terminal { flex: 1; overflow-y: scroll; padding: 10px; font-size: 13px; color: #00ff00; white-space: pre-wrap; background: #000; border-top: 1px solid #333; }
        .menu-btn { display: block; width: 100%; margin: 5px 0; padding: 10px; background: #222; color: #69f0ae; border: 1px solid #444; text-align: left; }
    </style>
</head>
<body>
    <div class="control-panel">
        <button id="conn-btn" onclick="connect()">[連接藍牙設備]</button>
        <div class="input-group">
            <input type="text" id="cmd-input" placeholder="輸入指令">
            <button onclick="sendCmd()">傳送</button>
        </div>
    </div>
    <div id="menu-area"></div>
    <div class="terminal" id="term"></div>

    <script>
        let rxChar = null;
        let txChar = null;
        let buffer = "";

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                rxChar = char;
                txChar = char;
                document.getElementById('conn-btn').innerText = "[已連線]";
                
                await rxChar.startNotifications();
                rxChar.addEventListener('characteristicvaluechanged', (event) => {
                    // 使用 TextDecoder 處理數據
                    const decoder = new TextDecoder('iso-8859-1');
                    const raw = decoder.decode(event.target.value);
                    processData(raw);
                });
            } catch (e) { alert("連線錯誤: " + e); }
        }

        function processData(chunk) {
            // 強力過濾：直接過濾所有非 ASCII 可列印字元 (除換行外)
            // 這能確保選單解析不被 ANSI 控制碼污染
            const clean = chunk.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
                               .replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '');
            
            document.getElementById('term').innerText += clean;
            document.getElementById('term').scrollTop = document.getElementById('term').scrollHeight;

            // 選單解析：只抓取乾淨的 (數字) 格式
            buffer += clean;
            if (buffer.includes('\n')) {
                const lines = buffer.split('\n');
                buffer = lines.pop();
                lines.forEach(line => {
                    if (/^\(\d+\)\s+.+/.test(line.trim())) {
                        createMenuBtn(line.trim());
                    }
                });
            }
        }

        function createMenuBtn(text) {
            const match = text.match(/\((\d+)\)/);
            if (!match) return;
            // 檢查是否已存在按鈕
            if (document.querySelector(`[data-cmd="${match[1]}"]`)) return;

            const btn = document.createElement('button');
            btn.className = "menu-btn";
            btn.innerText = text;
            btn.setAttribute("data-cmd", match[1]);
            btn.onclick = () => sendCmd(match[1]);
            document.getElementById('menu-area').appendChild(btn);
        }

        async function sendCommand(cmd) {
    if (!g_txCharacteristic) {
        appendLogToTerminal("\n[錯誤]: 藍牙尚未連接！\n");
        return;
    }

    const data = new TextEncoder().encode(cmd + "\r\n");
    
    try {
        // 強制檢查該特徵值擁有的寫入屬性
        const props = g_txCharacteristic.properties;
        
        if (props.writeWithResponse) {
            // 嘗試「有回應」寫入 (通常最穩定)
            await g_txCharacteristic.writeValueWithResponse(data);
            appendLogToTerminal(`\n>> 發送(Response): ${cmd}\n`);
        } else if (props.writeWithoutResponse) {
            // 嘗試「無回應」寫入
            await g_txCharacteristic.writeValueWithoutResponse(data);
            appendLogToTerminal(`\n>> 發送(NoResponse): ${cmd}\n`);
        } else {
            appendLogToTerminal("\n[錯誤]: 此特徵值不支援任何寫入屬性！\n");
        }
    } catch (error) {
        // 如果失敗，直接把錯誤訊息印出來，這是排查的核心
        appendLogToTerminal(`\n[傳送失敗]: ${error.message}\n`);
        console.error("BLE Write Error:", error);
    }
}
    </script>
</body>
</html>
